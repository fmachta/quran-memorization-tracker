<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You Santiago</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      font-weight: 700;
    }
    p {
      font-size: 1.2rem;
      opacity: 0.9;
      line-height: 1.6;
    }
    .wave { font-size: 2.5rem; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="wave">👋</span>
    <h1>Hi Santiago,</h1>
    <p>Thank you for the presentation!</p>
  </div>
</body>
</html>
